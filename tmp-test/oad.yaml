apiVersion: opc/v1
kind: Agent
metadata:
  name: test-agent
  version: 1.0.0
  description: Customer service agent with FAQ and human handoff
  author: OPC Agent
  license: Apache-2.0
spec:
  provider:
    default: deepseek
    allowed:
      - openai
      - deepseek
      - qwen
  model: deepseek-chat
  systemPrompt: >-
    You are a friendly and professional customer service agent. 

    You help customers with their questions about products, orders, shipping,
    and returns.

    Be concise, helpful, and empathetic. If you're unsure, offer to connect them
    with a human agent.
  skills:
    - name: faq-lookup
      description: Look up FAQ answers
    - name: human-handoff
      description: Hand off to human agent
  channels:
    - type: web
      port: 3456
  memory:
    shortTerm: true
    longTerm: false
